<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFTA Movement Analyzer — Algo Group</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --navy:#0b1629;--navy2:#152342;
  --blue:#2563eb;--blue2:#1d4ed8;--blue-light:#dbeafe;--blue-pale:#eff6ff;
  --green:#059669;--amber:#d97706;--red:#dc2626;
  --bg:#f1f5f9;--card:#ffffff;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--muted:#64748b;--subtle:#94a3b8;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --r:10px;--r-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* ─── HEADER ─── */
.app-bar{
  background:var(--navy);color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:54px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 8px rgba(0,0,0,.3)
}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;letter-spacing:-.02em}
.logo-icon{
  width:30px;height:30px;border-radius:8px;background:var(--blue);
  display:flex;align-items:center;justify-content:center
}
.app-bar-tag{font-size:11px;color:#94a3b8;font-weight:500}

/* ─── LAYOUT ─── */
.main{max-width:1180px;margin:0 auto;padding:24px}

/* ─── UPLOAD ─── */
.drop-zone{
  border:2.5px dashed var(--border2);border-radius:16px;
  background:var(--card);text-align:center;padding:56px 24px;
  cursor:pointer;transition:.2s;margin-bottom:24px
}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--blue);background:var(--blue-pale)}
.dz-icon{
  width:52px;height:52px;border-radius:14px;background:var(--blue-light);
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px
}
.dz-title{font-size:18px;font-weight:700;margin-bottom:6px}
.dz-sub{color:var(--muted);font-size:13px;margin-bottom:22px;line-height:1.5}

/* ─── BUTTONS ─── */
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
  border-radius:var(--r-sm);font-family:inherit;font-size:13px;
  font-weight:600;cursor:pointer;border:none;transition:.15s;white-space:nowrap
}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue2)}
.btn-outline{background:#fff;color:var(--text);border:1.5px solid var(--border)}
.btn-outline:hover{background:var(--bg);border-color:var(--border2)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 10px;font-size:11px;font-weight:700;border-radius:20px}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:20px}
.btn-ghost:hover{color:var(--text)}

/* ─── PROGRESS ─── */
#progress-section{
  background:var(--card);border-radius:var(--r);padding:24px;
  margin-bottom:24px;box-shadow:var(--shadow);border:1px solid var(--border)
}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.prog-label{font-size:14px;font-weight:600}
.prog-pct{font-size:14px;font-weight:700;color:var(--blue)}
.prog-track{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#60a5fa);border-radius:4px;transition:width .3s}
.prog-status{font-size:12px;color:var(--muted);margin-top:8px}

/* ─── FILES BAR ─── */
.files-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.file-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  background:var(--blue-light);border:1px solid #bfdbfe;
  font-size:12px;font-weight:600;color:var(--blue2)
}

/* ─── FILTERS CARD ─── */
.filters-card{
  background:var(--card);border-radius:var(--r);
  border:1px solid var(--border);box-shadow:var(--shadow);
  padding:16px 20px;margin-bottom:20px
}
.filters-head{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:14px
}
.filters-title{font-size:14px;font-weight:700}
.filters-count{font-size:12px;color:var(--muted);font-weight:600}
.filters-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px}
.fg-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px}

/* Toggle group */
.toggle-grp{display:flex;gap:4px;margin-bottom:8px}
.tgl{
  padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;
  cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--muted);
  transition:.12s;font-family:inherit
}
.tgl.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.tgl:hover:not(.active){border-color:var(--border2);color:var(--text)}

/* Dropdown */
.dd-wrap{position:relative}
.dd-trigger{
  width:100%;padding:8px 32px 8px 12px;border:1.5px solid var(--border);
  border-radius:var(--r-sm);font-family:inherit;font-size:13px;color:var(--muted);
  background:#fff;cursor:pointer;text-align:left;display:flex;align-items:center;
  justify-content:space-between;transition:.15s;font-weight:500
}
.dd-trigger:hover{border-color:var(--border2)}
.dd-trigger.has-val{color:var(--text)}
.dd-menu{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:#fff;border:1.5px solid var(--border);border-radius:var(--r-sm);
  box-shadow:var(--shadow-md);z-index:100;max-height:220px;overflow-y:auto;
  display:none
}
.dd-menu.open{display:block}
.dd-item{
  padding:8px 12px;font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:.1s;font-weight:500
}
.dd-item:hover{background:var(--bg)}
.dd-item input[type=checkbox]{accent-color:var(--blue);width:14px;height:14px}
.dd-item.checked{color:var(--blue);font-weight:600}

/* Chips row */
.chips-row{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  padding-top:14px;border-top:1px solid var(--border)
}
.chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;
  background:var(--bg);border:1.5px solid var(--border);
  font-size:12px;font-weight:700;color:var(--text)
}
.chip-x{cursor:pointer;color:var(--muted);font-size:15px;line-height:1;margin-left:2px}
.chip-x:hover{color:var(--text)}

/* ─── STATS ─── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{
  background:var(--card);border-radius:var(--r);padding:16px 18px;
  box-shadow:var(--shadow);border:1px solid var(--border)
}
.stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:5px}
.stat-val{font-size:24px;font-weight:800;color:var(--text);line-height:1.1}
.stat-sub{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500}

/* ─── TABLE CARD ─── */
.table-card{
  background:var(--card);border-radius:var(--r);
  box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden
}
.table-head-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border)
}
.table-head-title{font-size:14px;font-weight:700}
.export-grp{display:flex;gap:8px}

table{width:100%;border-collapse:collapse}
thead th{
  background:#f8fafc;padding:10px 16px;
  font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;
  color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;
  text-align:left
}
thead th:not(:first-child){text-align:right}
tbody tr{border-bottom:1px solid #f1f5f9;transition:.1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f8fafc}
tbody td{padding:11px 16px;font-size:13px;font-weight:500}
tbody td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}

.state-cell{display:flex;align-items:center;gap:10px}
.state-tag{
  display:inline-flex;align-items:center;justify-content:center;
  width:32px;height:22px;border-radius:5px;
  background:var(--blue-light);color:var(--blue2);
  font-size:10px;font-weight:800;letter-spacing:.04em;flex-shrink:0
}
.state-name{font-weight:600;color:var(--text)}
.state-abbr{font-size:11px;color:var(--muted);font-weight:500}

.miles-cell{display:flex;align-items:center;justify-content:flex-end;gap:10px}
.miles-bar-wrap{width:64px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0}
.miles-bar{height:100%;background:linear-gradient(90deg,var(--blue),#60a5fa);border-radius:3px}
.miles-val{min-width:68px;text-align:right;font-weight:700}

tfoot tr{background:var(--blue-pale);border-top:2px solid var(--blue-light)}
tfoot td{padding:12px 16px;font-size:13px;font-weight:800;color:var(--blue2)}
tfoot td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}

/* ─── VEHICLE BANNER ─── */
.vehicle-banner{
  display:flex;align-items:center;gap:14px;
  padding:12px 20px;border-bottom:1px solid var(--border);
  background:#f8fafc
}
.veh-badge{
  width:42px;height:42px;border-radius:10px;background:var(--navy);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;letter-spacing:-.02em;flex-shrink:0
}
.veh-name{font-size:14px;font-weight:700;color:var(--text)}
.veh-meta{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500}

/* ─── ADD MORE ─── */
.add-more-lbl{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border:2px dashed var(--border);border-radius:var(--r-sm);
  background:#fff;font-size:12px;font-weight:700;color:var(--muted);
  cursor:pointer;transition:.15s
}
.add-more-lbl:hover{border-color:var(--blue);color:var(--blue)}

/* ─── EMPTY / ERROR ─── */
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}

/* ─── UTIL ─── */
[hidden]{display:none!important}
.sr{display:flex;align-items:center;gap:8px}
.divider{height:1px;background:var(--border);margin:20px 0}
</style>
</head>
<body>

<!-- ─── TOP BAR ─── -->
<header class="app-bar">
  <div class="logo">
    <div class="logo-icon">
      <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.2">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </div>
    IFTA Movement Analyzer
  </div>
  <span class="app-bar-tag">Algo Group LLC</span>
</header>

<div class="main">

<!-- ─── UPLOAD SECTION ─── -->
<div id="upload-section">
  <div class="drop-zone" id="drop-zone">
    <div class="dz-icon">
      <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#2563eb" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <div class="dz-title">Upload IFTA Movement Report PDF</div>
    <div class="dz-sub">
      Drag &amp; drop your ELD movement report PDF here<br>
      or click to browse — supports multiple files for multiple vehicles
    </div>
    <button class="btn btn-primary" onclick="event.stopPropagation();document.getElementById('fi').click()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Choose PDF File
    </button>
  </div>
</div>

<!-- ─── PROGRESS ─── -->
<div id="progress-section" hidden>
  <div class="prog-header">
    <span class="prog-label" id="prog-label">Parsing PDF…</span>
    <span class="prog-pct" id="prog-pct">0%</span>
  </div>
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

</div>

<!-- ─── RESULTS ─── -->
<div id="results-section" hidden>

  <!-- Files bar -->
  <div class="files-bar" id="files-bar">
    <div id="file-chips"></div>
    <label class="add-more-lbl">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add More PDFs
      <input type="file" id="fi-more" accept=".pdf" multiple style="display:none">
    </label>
  </div>

  <!-- Filters card -->
  <div class="filters-card">
    <div class="filters-head">
      <span class="filters-title">Filters</span>
      <span class="filters-count" id="f-count">Showing 0/0 units</span>
    </div>
    <div class="filters-grid">

      <!-- Units -->
      <div>
        <div class="fg-label">Units</div>
        <div class="toggle-grp" id="units-tgl">
          <button class="tgl active" data-m="all"    onclick="setMode('unit','all')">All</button>
          <button class="tgl"        data-m="include" onclick="setMode('unit','include')">Include</button>
          <button class="tgl"        data-m="exclude" onclick="setMode('unit','exclude')">Exclude</button>
        </div>
        <div class="dd-wrap">
          <button class="dd-trigger" id="units-trig" onclick="openDD('units')">
            <span id="units-lbl">Choose units…</span>
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="dd-menu" id="units-menu"></div>
        </div>
      </div>

      <!-- States -->
      <div>
        <div class="fg-label">States</div>
        <div class="toggle-grp" id="states-tgl">
          <button class="tgl active" data-m="all"    onclick="setMode('state','all')">All</button>
          <button class="tgl"        data-m="include" onclick="setMode('state','include')">Include</button>
          <button class="tgl"        data-m="exclude" onclick="setMode('state','exclude')">Exclude</button>
        </div>
        <div class="dd-wrap">
          <button class="dd-trigger" id="states-trig" onclick="openDD('states')">
            <span id="states-lbl">Choose states…</span>
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="dd-menu" id="states-menu"></div>
        </div>
      </div>

    </div>
    <!-- Active chips -->
    <div class="chips-row" id="chips-row" style="display:none">
      <div id="active-chips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      <button class="btn-ghost btn-xs" onclick="resetFilters()">Reset</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="stats-row"></div>

  <!-- Table -->
  <div class="table-card" id="table-card">
    <div class="table-head-bar">
      <span class="table-head-title" id="tbl-title">State Breakdown</span>
      <div class="export-grp">
        <button class="btn btn-outline btn-sm" onclick="doExcelExport()">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/>
          </svg>
          Excel
        </button>
        <button class="btn btn-primary btn-sm" onclick="doPDFExport()">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          Export PDF
        </button>
      </div>
    </div>
    <div id="tbl-body"></div>
  </div>

</div><!-- /results -->
</div><!-- /main -->

<input type="file" id="fi"      accept=".pdf" multiple style="display:none">
<input type="file" id="fi-more" accept=".pdf" multiple style="display:none" form="">

<script>
// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
const allVehicles = {};   // id → {info, states:{ST:{miles,firstOdo,lastOdo}}, fileName}
const uploadedFiles = []; // file objects
const F = {               // filters
  unitMode:'all', selectedUnits: new Set(),
  stateMode:'all', selectedStates: new Set()
};

// ══════════════════════════════════════════════
//  PDF PARSING
// ══════════════════════════════════════════════
function parseVehicleHeader(textItems) {
  const info = { vehicle:'Unknown', vin:'', company:'', period:'', periodFrom:'', periodTo:'' };
  // Join all items by y-group to reconstruct lines
  const lines = reconstructLines(textItems);
  let foundMR = false;
  for (const line of lines) {
    if (line.includes('MOVEMENT REPORT')) { foundMR = true; continue; }
    if (foundMR && !info.company && line.trim().length > 3 && !line.match(/^\d/)) {
      info.company = line.trim(); foundMR = false;
    }
    const vm = line.match(/Vehicle:\s*(\w+)\s*\(([^)]+)\)/);
    if (vm) { info.vehicle = vm[1]; info.vin = vm[2]; }
    const pm = line.match(/Period:\s*from\s*(\S+)\s+to\s+(\S+)/i);
    if (pm) {
      info.periodFrom = pm[1]; info.periodTo = pm[2];
      info.period = `${pm[1]} to ${pm[2]}`;
    }
  }
  return info;
}

function reconstructLines(items) {
  if (!items.length) return [];
  const byY = {};
  for (const it of items) {
    if (!it.str || !it.str.trim()) continue;
    const y = Math.round(it.transform[5] * 2) / 2; // round to 0.5
    if (!byY[y]) byY[y] = [];
    byY[y].push({ x: it.transform[4], t: it.str });
  }
  return Object.keys(byY)
    .map(Number)
    .sort((a,b) => b - a)
    .map(y => byY[y].sort((a,b) => a.x - b.x).map(i => i.t).join(' ').trim())
    .filter(Boolean);
}

function parsePageEntries(items) {
  // Use column-based approach:
  // Odometer col: x ≈ 680–752 (value ≥ 100000 to distinguish from eng hours)
  // Location col: x ≈ 200–450 (includes city + state)
  const entries = [];

  // Find odometer items
  const odoItems = items.filter(it => {
    const x = it.transform[4];
    const s = it.str.trim();
    if (x < 680 || x > 758) return false;
    if (!/^\d[\d,]*\.\d+$/.test(s)) return false;
    const v = parseFloat(s.replace(/,/g,''));
    return v > 100000; // distinguish from eng hours (~25,000)
  });

  for (const odo of odoItems) {
    const odoY = odo.transform[5];
    const odoVal = parseFloat(odo.str.replace(/,/g,''));

    // Collect location items within ±20 Y units
    const locItems = items.filter(it => {
      const x = it.transform[4];
      const y = it.transform[5];
      return x > 200 && x < 455 && Math.abs(y - odoY) <= 20 && it.str.trim();
    }).sort((a,b) => {
      const dy = b.transform[5] - a.transform[5];
      return Math.abs(dy) > 2 ? dy : a.transform[4] - b.transform[4];
    });

    const locText = locItems.map(i => i.str).join(' ').trim();
    const sm = locText.match(/,\s*([A-Z]{2})(?:\s|$)/);
    if (sm) {
      entries.push({ state: sm[1], odometer: odoVal });
    }
  }

  // Sort by natural order (by Y descending = top of page first)
  // They should already be roughly ordered
  return entries;
}

function calcStateStats(entries) {
  // entries in chronological order (page 1 → last page, top → bottom)
  const stats = {};
  let prevOdo = null;

  for (const { state, odometer } of entries) {
    if (!(state in stats)) {
      stats[state] = { miles: 0, firstOdo: odometer, lastOdo: odometer };
    }
    if (prevOdo !== null) {
      const delta = Math.max(0, odometer - prevOdo);
      stats[state].miles += delta;
    }
    stats[state].lastOdo = odometer;
    prevOdo = odometer;
  }

  for (const s in stats) {
    stats[s].miles = Math.round(stats[s].miles * 10) / 10;
  }
  return stats;
}

async function parsePDF(file, onProg) {
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({
    data: ab,
    disableFontFace: true,
    verbosity: 0
  }).promise;

  const total = pdf.numPages;
  let info = null;
  const allEntries = [];
  const BATCH = 30;

  for (let s = 1; s <= total; s += BATCH) {
    const end = Math.min(s + BATCH - 1, total);
    const batch = [];
    for (let p = s; p <= end; p++) {
      batch.push(
        pdf.getPage(p)
          .then(pg => pg.getTextContent({ includeMarkedContent: false }))
          .then(tc => ({ p, items: tc.items }))
      );
    }
    const results = (await Promise.all(batch)).sort((a,b) => a.p - b.p);

    for (const { p, items } of results) {
      if (p === 1) info = parseVehicleHeader(items);
      // Within a page, sort entries by Y desc (top first) before pushing
      const pageEntries = parsePageEntries(items);
      // Sort by odometer ascending (since odometer always increases)
      pageEntries.sort((a,b) => a.odometer - b.odometer);
      allEntries.push(...pageEntries);
    }

    onProg(end, total);
    await new Promise(r => setTimeout(r, 0));
  }

  return { info: info || { vehicle: file.name, vin:'', company:'', period:'' }, entries: allEntries };
}

// ══════════════════════════════════════════════
//  FILE HANDLING
// ══════════════════════════════════════════════
async function handleFiles(files) {
  const pdfs = Array.from(files).filter(f => f.name.endsWith('.pdf'));
  if (!pdfs.length) return;

  document.getElementById('upload-section').hidden = true;
  document.getElementById('progress-section').hidden = false;
  document.getElementById('results-section').hidden = true;

  for (let fi = 0; fi < pdfs.length; fi++) {
    const file = pdfs[fi];
    uploadedFiles.push(file);
    setProgress(0, 1, `Loading ${file.name}…`);
    document.getElementById('prog-label').textContent = `Parsing ${fi+1}/${pdfs.length}: ${file.name}`;

    try {
      const { info, entries } = await parsePDF(file, (done, tot) => {
        setProgress(done, tot, `Pages parsed: ${done} / ${tot}`);
      });
      const vid = info.vehicle || file.name;
      allVehicles[vid] = {
        info,
        states: calcStateStats(entries),
        fileName: file.name,
        entryCount: entries.length
      };
    } catch (err) {
      console.error(err);
      alert(`Error parsing ${file.name}:\n${err.message}`);
    }
  }

  document.getElementById('progress-section').hidden = true;
  document.getElementById('results-section').hidden = false;
  renderAll();
}

function setProgress(done, tot, status) {
  const pct = tot > 0 ? Math.round((done/tot)*100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-status').textContent = status;
}

// ══════════════════════════════════════════════
//  FILTERS
// ══════════════════════════════════════════════
function setMode(type, mode) {
  if (type === 'unit') {
    F.unitMode = mode;
    document.querySelectorAll('#units-tgl .tgl').forEach(b => b.classList.toggle('active', b.dataset.m === mode));
  } else {
    F.stateMode = mode;
    document.querySelectorAll('#states-tgl .tgl').forEach(b => b.classList.toggle('active', b.dataset.m === mode));
  }
  refreshTable(); updateChips(); updateCount();
}

let ddOpen = null;
function openDD(which) {
  const menu = document.getElementById(which === 'units' ? 'units-menu' : 'states-menu');
  if (ddOpen === which) { menu.classList.remove('open'); ddOpen = null; return; }
  document.querySelectorAll('.dd-menu').forEach(m => m.classList.remove('open'));
  ddOpen = which;
  populateDD(which);
  menu.classList.add('open');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.dd-wrap')) {
    document.querySelectorAll('.dd-menu').forEach(m => m.classList.remove('open'));
    ddOpen = null;
  }
});

function populateDD(which) {
  const menu = document.getElementById(which === 'units' ? 'units-menu' : 'states-menu');
  const sel = which === 'units' ? F.selectedUnits : F.selectedStates;
  menu.innerHTML = '';

  let items = [];
  if (which === 'units') {
    items = Object.keys(allVehicles).sort();
  } else {
    const all = new Set();
    Object.values(allVehicles).forEach(v => Object.keys(v.states).forEach(s => all.add(s)));
    items = [...all].sort();
  }

  if (!items.length) {
    menu.innerHTML = '<div class="dd-item" style="color:var(--muted)">No options</div>';
    return;
  }

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'dd-item' + (sel.has(item) ? ' checked' : '');
    div.innerHTML = `<input type="checkbox" ${sel.has(item)?'checked':''}>
      <span>${which === 'units' ? 'Unit ' + item : item + (STATE_NAMES[item] ? ' — ' + STATE_NAMES[item] : '')}</span>`;
    div.onclick = e => {
      e.stopPropagation();
      if (sel.has(item)) sel.delete(item); else sel.add(item);
      populateDD(which);
      updateDDLabel(which);
      refreshTable(); updateChips(); updateCount();
    };
    menu.appendChild(div);
  });
}

function updateDDLabel(which) {
  const sel = which === 'units' ? F.selectedUnits : F.selectedStates;
  const lbl = document.getElementById(which === 'units' ? 'units-lbl' : 'states-lbl');
  const trig = document.getElementById(which === 'units' ? 'units-trig' : 'states-trig');
  if (sel.size === 0) {
    lbl.textContent = which === 'units' ? 'Choose units…' : 'Choose states…';
    trig.classList.remove('has-val');
  } else {
    lbl.textContent = [...sel].join(', ');
    trig.classList.add('has-val');
  }
}

function updateChips() {
  const cr = document.getElementById('chips-row');
  const ac = document.getElementById('active-chips');
  const hasAny = F.selectedStates.size > 0 || F.selectedUnits.size > 0;
  cr.style.display = hasAny ? 'flex' : 'none';
  ac.innerHTML = '';

  [...F.selectedStates].sort().forEach(s => {
    const c = document.createElement('span');
    c.className = 'chip';
    c.innerHTML = `${s}<span class="chip-x" onclick="removeChip('state','${s}')">×</span>`;
    ac.appendChild(c);
  });
  [...F.selectedUnits].sort().forEach(u => {
    const c = document.createElement('span');
    c.className = 'chip';
    c.innerHTML = `Unit ${u}<span class="chip-x" onclick="removeChip('unit','${u}')">×</span>`;
    ac.appendChild(c);
  });
}

function removeChip(type, val) {
  if (type === 'state') F.selectedStates.delete(val);
  else F.selectedUnits.delete(val);
  updateDDLabel(type === 'state' ? 'states' : 'units');
  updateChips(); refreshTable(); updateCount();
}

function resetFilters() {
  F.selectedStates.clear(); F.selectedUnits.clear();
  F.unitMode = 'all'; F.stateMode = 'all';
  document.querySelectorAll('.tgl[data-m="all"]').forEach(b => b.classList.add('active'));
  document.querySelectorAll('.tgl:not([data-m="all"])').forEach(b => b.classList.remove('active'));
  updateDDLabel('units'); updateDDLabel('states');
  updateChips(); refreshTable(); updateCount();
}

function updateCount() {
  const total = Object.keys(allVehicles).length;
  const { vehicles } = getFiltered();
  document.getElementById('f-count').textContent = `Showing ${vehicles.length}/${total} units`;
}

// ══════════════════════════════════════════════
//  FILTER LOGIC
// ══════════════════════════════════════════════
function getFiltered() {
  let vehicles = Object.entries(allVehicles);

  if (F.unitMode === 'include' && F.selectedUnits.size > 0)
    vehicles = vehicles.filter(([id]) => F.selectedUnits.has(id));
  else if (F.unitMode === 'exclude' && F.selectedUnits.size > 0)
    vehicles = vehicles.filter(([id]) => !F.selectedUnits.has(id));

  const agg = {}; // state → {miles, firstOdo, lastOdo}
  for (const [, vd] of vehicles) {
    for (const [st, sd] of Object.entries(vd.states)) {
      if (F.stateMode === 'include' && F.selectedStates.size > 0 && !F.selectedStates.has(st)) continue;
      if (F.stateMode === 'exclude' && F.selectedStates.size > 0 && F.selectedStates.has(st)) continue;
      if (!agg[st]) agg[st] = { miles: 0, firstOdo: sd.firstOdo, lastOdo: sd.lastOdo };
      agg[st].miles += sd.miles;
      agg[st].firstOdo = Math.min(agg[st].firstOdo, sd.firstOdo);
      agg[st].lastOdo  = Math.max(agg[st].lastOdo,  sd.lastOdo);
    }
  }
  // Round aggregated miles
  for (const s in agg) agg[s].miles = Math.round(agg[s].miles * 10) / 10;
  return { vehicles, agg };
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function renderAll() {
  renderFileChips();
  updateDDLabel('units'); updateDDLabel('states');
  updateCount(); updateChips();
  renderStats(); refreshTable();
}

function renderFileChips() {
  const c = document.getElementById('file-chips');
  c.innerHTML = '';
  uploadedFiles.forEach(f => {
    const chip = document.createElement('span');
    chip.className = 'file-chip';
    chip.innerHTML = `<svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>${f.name}`;
    c.appendChild(chip);
  });
}

function renderStats() {
  const { vehicles, agg } = getFiltered();
  const totalMiles = Object.values(agg).reduce((s,v) => s+v.miles, 0);
  const stateCount = Object.keys(agg).length;
  const period = vehicles.length > 0 ? (vehicles[0][1].info.period || '—') : '—';

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-lbl">Total Miles</div>
      <div class="stat-val">${fmt1(totalMiles)}</div>
      <div class="stat-sub">All jurisdictions</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">Jurisdictions</div>
      <div class="stat-val">${stateCount}</div>
      <div class="stat-sub">States / provinces</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">Vehicles</div>
      <div class="stat-val">${vehicles.length}</div>
      <div class="stat-sub">Active units</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">Report Period</div>
      <div class="stat-val" style="font-size:15px;font-weight:700;line-height:1.4">${period}</div>
      <div class="stat-sub">IFTA quarter</div>
    </div>
  `;
}

function refreshTable() {
  renderStats();
  const { vehicles, agg } = getFiltered();
  const body = document.getElementById('tbl-body');

  if (Object.keys(agg).length === 0) {
    body.innerHTML = '<div class="empty"><h3>No data matches your filters</h3><p>Try adjusting the unit or state filters above.</p></div>';
    return;
  }

  const sorted = Object.entries(agg).sort((a,b) => a[0].localeCompare(b[0]));
  const totalMiles = sorted.reduce((s,[,v]) => s+v.miles, 0);
  const maxMiles = Math.max(...sorted.map(([,v]) => v.miles));
  const multiVeh = vehicles.length > 1;

  let html = '';

  // Per-vehicle banner if single
  if (vehicles.length === 1) {
    const [vid, vd] = vehicles[0];
    html += `
      <div class="vehicle-banner">
        <div class="veh-badge">${vid.toString().substring(0,3).toUpperCase()}</div>
        <div>
          <div class="veh-name">Unit ${vid}${vd.info.vin ? ' — ' + vd.info.vin : ''}</div>
          <div class="veh-meta">${vd.info.company || ''}${vd.info.period ? ' · ' + vd.info.period : ''} · ${vd.entryCount?.toLocaleString() || '—'} GPS points</div>
        </div>
      </div>`;
  }

  html += `<table><thead><tr>
    <th>State</th>
    <th>Odometer Start</th>
    <th>Odometer End</th>
    <th>Miles in State</th>
    ${multiVeh ? '<th>Units</th>' : ''}
  </tr></thead><tbody>`;

  for (const [st, d] of sorted) {
    const barPct = maxMiles > 0 ? (d.miles / maxMiles * 100).toFixed(1) : 0;
    html += `<tr>
      <td><div class="state-cell">
        <div class="state-tag">${st}</div>
        <div>
          <div class="state-name">${STATE_NAMES[st] || st}</div>
          ${STATE_NAMES[st] ? `<div class="state-abbr">${st}</div>` : ''}
        </div>
      </div></td>
      <td>${fmtOdo(d.firstOdo)}</td>
      <td>${fmtOdo(d.lastOdo)}</td>
      <td><div class="miles-cell">
        <div class="miles-bar-wrap"><div class="miles-bar" style="width:${barPct}%"></div></div>
        <span class="miles-val">${fmt1(d.miles)}</span>
      </div></td>
      ${multiVeh ? '<td>' + (d.vehicleCount ?? '') + '</td>' : ''}
    </tr>`;
  }

  html += `</tbody><tfoot><tr>
    <td>Total</td><td></td><td></td>
    <td style="text-align:right">${fmt1(totalMiles)}</td>
    ${multiVeh ? '<td></td>' : ''}
  </tr></tfoot></table>`;

  body.innerHTML = html;
}

// ══════════════════════════════════════════════
//  EXPORT
// ══════════════════════════════════════════════
function doExcelExport() {
  const { vehicles, agg } = getFiltered();
  const wb = XLSX.utils.book_new();

  // Per-vehicle sheets
  for (const [vid, vd] of vehicles) {
    const rows = [
      ['IFTA Movement Report — ' + vid],
      [`Vehicle: ${vid}${vd.info.vin ? ' (' + vd.info.vin + ')' : ''}`],
      [`Period: ${vd.info.period || ''}`],
      [`Company: ${vd.info.company || ''}`],
      [],
      ['State', 'State Name', 'Odometer Start', 'Odometer End', 'Miles in State'],
    ];
    const vstates = Object.entries(vd.states)
      .filter(([st]) => {
        if (F.stateMode === 'include' && F.selectedStates.size > 0) return F.selectedStates.has(st);
        if (F.stateMode === 'exclude' && F.selectedStates.size > 0) return !F.selectedStates.has(st);
        return true;
      })
      .sort((a,b) => a[0].localeCompare(b[0]));
    const vtotal = vstates.reduce((s,[,v]) => s + v.miles, 0);
    vstates.forEach(([st,sd]) => rows.push([st, STATE_NAMES[st]||st, sd.firstOdo, sd.lastOdo, sd.miles]));
    rows.push(['', '', '', 'Total Miles:', vtotal]);
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:8},{wch:26},{wch:18},{wch:16},{wch:16}];
    XLSX.utils.book_append_sheet(wb, ws, ('Unit ' + vid).substring(0,31));
  }

  // Summary sheet if multiple
  if (vehicles.length > 1) {
    const rows = [
      ['IFTA Summary Report'],
      [],
      ['State', 'State Name', 'Odometer Start', 'Odometer End', 'Miles in State'],
    ];
    const sorted = Object.entries(agg).sort((a,b) => a[0].localeCompare(b[0]));
    const total = sorted.reduce((s,[,v]) => s+v.miles, 0);
    sorted.forEach(([st,sd]) => rows.push([st, STATE_NAMES[st]||st, sd.firstOdo, sd.lastOdo, sd.miles]));
    rows.push(['', '', '', 'Total Miles:', total]);
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:8},{wch:26},{wch:18},{wch:16},{wch:16}];
    XLSX.utils.book_append_sheet(wb, ws, 'Summary');
  }

  XLSX.writeFile(wb, 'ifta-movement-report.xlsx');
}

  const { vehicles, agg } = getFiltered();
  const NAV = [11,22,42]; const BLU = [37,99,235];

  for (let vi = 0; vi < vehicles.length; vi++) {
    if (vi > 0) doc.addPage();
    const [vid, vd] = vehicles[vi];
    const { info } = vd;

    // ── Header bar ──
    doc.setFillColor(...NAV);
    doc.rect(0, 0, 215.9, 22, 'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(15); doc.setTextColor(255,255,255);
    doc.text('IFTA Movement Report', 14, 14.5);
    doc.setFontSize(9); doc.setFont('helvetica','normal');
    doc.text('Algo Group LLC — algGroup.us', 155, 14.5);

    // ── Info box (like Image 1) ──
    doc.setFillColor(239,246,255);
    doc.rect(14, 26, 185, 19, 'F');
    doc.setDrawColor(219,234,254); doc.rect(14,26,185,19);

    doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...NAV);
    doc.text('Vehicle Identification: ' + vid, 18, 33);
    doc.setFont('helvetica','normal');
    doc.text('Reporting Period: ' + (info.period || '—'), 18, 39);
    doc.setFont('helvetica','bold');
    doc.text('VIN: ' + (info.vin || '—'), 115, 33);
    doc.setFont('helvetica','normal');
    doc.text('Company: ' + (info.company || '—'), 115, 39);

    // ── Filter states for this vehicle ──
    let vstates = Object.entries(vd.states);
    if (F.stateMode === 'include' && F.selectedStates.size > 0)
      vstates = vstates.filter(([s]) => F.selectedStates.has(s));
    else if (F.stateMode === 'exclude' && F.selectedStates.size > 0)
      vstates = vstates.filter(([s]) => !F.selectedStates.has(s));
    vstates.sort((a,b) => a[0].localeCompare(b[0]));
    const vtotal = vstates.reduce((s,[,v]) => s+v.miles, 0);

    const tableData = vstates.map(([st,sd]) => [
      st,
      fmtOdo(sd.firstOdo),
      fmtOdo(sd.lastOdo),
      fmt1(sd.miles)
    ]);

    doc.autoTable({
      head: [['State', 'Odometer Start', 'Odometer End', 'Miles in State']],
      body: tableData,
      startY: 50,
      styles: { fontSize:9, cellPadding:4, font:'helvetica', valign:'middle' },
      headStyles: {
        fillColor: NAV,
        textColor: [255,255,255],
        fontStyle:'bold',
        halign:'left'
      },
      columnStyles: {
        0: { halign:'left',  cellWidth:30 },
        1: { halign:'right', cellWidth:55 },
        2: { halign:'right', cellWidth:55 },
        3: { halign:'right', cellWidth:50 }
      },
      alternateRowStyles: { fillColor:[248,250,252] },
      foot: [['', '', 'Total Miles:', fmt1(vtotal)]],
      footStyles: {
        fillColor:[239,246,255], textColor:BLU,
        fontStyle:'bold', halign:'right'
      },
      margin: { left:14, right:14 }
    });
  }

  doc.save('ifta-movement-report.pdf');
}

}
function fmtOdo(n) {

}
